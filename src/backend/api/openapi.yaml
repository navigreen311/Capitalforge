      operationId: listAgentRuns
      summary: List all agent runs (optionally filter by agentType)
      parameters:
        - name: agentType
          in: query
          schema:
            type: string
            enum: [statement, kyb, contract, acknowledgment, evidence_bundle]
      responses:
        '200':
          description: Agent runs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AgentRunResult'

  /vaf/ocr/statement:
    post:
      tags: [VisionAudioForge]
      operationId: ingestStatement
      summary: Ingest a bank or credit-card statement and extract transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessId, fileContent, mimeType, fileName]
              properties:
                businessId:
                  type: string
                  format: uuid
                fileContent:
                  type: string
                  description: Base64-encoded statement
                mimeType:
                  type: string
                fileName:
                  type: string
                uploadedBy:
                  type: string
      responses:
        '200':
          description: Statement ingested with extracted transactions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProcessDocumentResult'

  /vaf/ocr/adverse-action:
    post:
      tags: [VisionAudioForge]
      operationId: parseAdverseAction
      summary: Parse an adverse-action denial letter and extract regulatory reasons
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessId, fileContent, mimeType, fileName]
              properties:
                businessId:
                  type: string
                  format: uuid
                fileContent:
                  type: string
                  description: Base64-encoded letter
                mimeType:
                  type: string
                fileName:
                  type: string
                uploadedBy:
                  type: string
      responses:
        '200':
          description: Adverse action parsed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProcessDocumentResult'

  /vaf/verify/id-liveness:
    post:
      tags: [VisionAudioForge]
      operationId: verifyIdLiveness
      summary: Biometric ID liveness detection and document authenticity check
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idImageContent, mimeType, fileName]
              properties:
                businessId:
                  type: string
                  format: uuid
                uploadedBy:
                  type: string
                idImageContent:
                  type: string
                  description: Base64-encoded ID photograph
                mimeType:
                  type: string
                fileName:
                  type: string
                referencePhotoContent:
                  type: string
                  description: Optional base64-encoded selfie for face match
      responses:
        '200':
          description: Liveness detection result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IdLivenessResult'

  # ── Health ──────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [Platform & SaaS]
      operationId: healthCheck
      summary: Basic liveness probe
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  uptime:
                    type: number
                  timestamp:
                    type: string
                    format: date-time

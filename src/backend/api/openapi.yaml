  # ══════════════════════════════════════════════════════════════════════════
  # VOICEFORGE
  # ══════════════════════════════════════════════════════════════════════════

  /voiceforge/calls:
    post:
      tags: [VoiceForge]
      operationId: initiateCall
      summary: Initiate an outbound call with TCPA consent enforcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessId, toPhoneNumber, fromPhoneNumber, purpose]
              properties:
                businessId:
                  type: string
                  format: uuid
                toPhoneNumber:
                  type: string
                fromPhoneNumber:
                  type: string
                advisorId:
                  type: string
                  format: uuid
                purpose:
                  type: string
                  maxLength: 500
                campaignType:
                  type: string
                  enum: [apr_expiry, repayment_reminder, restack_consultation]
                campaignId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Call initiated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CallRecord'
        '403':
          description: TCPA consent blocked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      error:
                        type: object
                        properties:
                          code:
                            type: string
                            example: TCPA_CONSENT_BLOCKED
                          reason:
                            type: string
    get:
      tags: [VoiceForge]
      operationId: listCalls
      summary: List call records for the tenant
      parameters:
        - name: businessId
          in: query
          schema:
            type: string
            format: uuid
        - name: advisorId
          in: query
          schema:
            type: string
            format: uuid
        - name: campaignType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Call records
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/CallRecord'
                          total:
                            type: integer
                          page:
                            type: integer
                          pageSize:
                            type: integer

  /voiceforge/calls/{id}:
    get:
      tags: [VoiceForge]
      operationId: getCall
      summary: Retrieve a single call record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Call record
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CallRecord'
        '404':
          $ref: '#/components/responses/NotFound'


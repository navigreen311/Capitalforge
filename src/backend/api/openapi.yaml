openapi: 3.1.0

info:
  title: CapitalForge API
  version: 2.0.0
  description: |
    CapitalForge is a multi-tenant B2B lending-stack platform that guides small
    businesses from credit profiling through card-stack optimisation, funding
    rounds, compliance, billing, and AI-assisted document intelligence.

    **Authentication** — All protected endpoints require a Bearer JWT obtained
    from `POST /api/auth/login`. Include it as:
    ```
    Authorization: Bearer <accessToken>
    ```
    Tokens expire after 15 minutes. Use `POST /api/auth/refresh` to rotate.

    **Tenant scoping** — Every resource is isolated by `tenantId` encoded in
    the JWT. Passing an `X-Tenant-Id` header is also accepted in dev/test mode.

  contact:
    name: CapitalForge Platform Engineering
    email: platform@capitalforge.io
  license:
    name: Proprietary

servers:
  - url: http://localhost:4000/api
    description: Local development
  - url: https://staging-api.capitalforge.io/api
    description: Staging
  - url: https://api.capitalforge.io/api
    description: Production

security:
  - bearerAuth: []

# ─────────────────────────────────────────────────────────────────────────────
# Tags
# ─────────────────────────────────────────────────────────────────────────────
tags:
  - name: Auth
    description: Authentication — login, register, token rotation, logout
  - name: Core Operations
    description: Business onboarding, KYB/KYC, application pipeline, credit intelligence, funding rounds
  - name: Financial Control
    description: Repayments, ACH, spend governance, cost calculator, card-stack optimizer, billing & invoices
  - name: Compliance & Governance
    description: Compliance checks, consent, contracts, complaints, regulatory, governance cadence, fair-lending
  - name: Platform & SaaS
    description: Admin, tenants, webhooks, integrations, API keys, observability, deal committee
  - name: VoiceForge
    description: Outbound telephony, campaign outreach, transcript compliance scanning
  - name: VisionAudioForge
    description: Document OCR, bank-statement ingestion, adverse-action parsing, ID liveness detection, AI agent orchestration

# ─────────────────────────────────────────────────────────────────────────────
# Reusable components
# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256-signed JWT. Obtain via POST /api/auth/login.

  parameters:
    businessId:
      name: id
      in: path
      required: true
      description: UUID of the Business resource
      schema:
        type: string
        format: uuid
    roundId:
      name: id
      in: path
      required: true
      description: UUID of the FundingRound resource
      schema:
        type: string
        format: uuid
    documentId:
      name: id
      in: path
      required: true
      description: UUID of the Document resource
      schema:
        type: string
        format: uuid
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20

  schemas:

    # ── Envelope ────────────────────────────────────────────────────────────
    ApiResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        data:
          description: Present on success; shape varies by endpoint
        error:
          $ref: '#/components/schemas/ApiError'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid request body.
        details:
          description: Field-level validation errors or additional context

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    # ── Auth ────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password, tenantId]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        tenantId:
          type: string
          format: uuid

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName, tenantId]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
          maxLength: 128
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        tenantId:
          type: string
          format: uuid
        role:
          type: string
          enum: [advisor, client, compliance_officer, readonly, tenant_admin]

    AuthTokens:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    AuthUser:
      type: object
      required: [id, email, tenantId, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        tenantId:
          type: string
          format: uuid
        role:
          type: string

    # ── Business / Onboarding ────────────────────────────────────────────────
    Business:
      type: object
      required: [id, tenantId, legalName, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        legalName:
          type: string
          example: Acme Widgets LLC
        dba:
          type: string
        entityType:
          type: string
          enum: [LLC, S_CORP, C_CORP, SOLE_PROP, PARTNERSHIP, NON_PROFIT]
        ein:
          type: string
          pattern: ^\d{2}-\d{7}$
        naicsCode:
          type: string
        monthlyRevenue:
          type: number
          format: double
        yearsInBusiness:
          type: number
        state:
          type: string
          maxLength: 2
        status:
          type: string
          enum: [pending, active, suspended, closed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBusinessRequest:
      type: object
      required: [legalName, entityType, state]
      properties:
        legalName:
          type: string
        dba:
          type: string
        entityType:
          type: string
          enum: [LLC, S_CORP, C_CORP, SOLE_PROP, PARTNERSHIP, NON_PROFIT]
        ein:
          type: string
        naicsCode:
          type: string
        monthlyRevenue:
          type: number
        yearsInBusiness:
          type: number
        state:
          type: string
          maxLength: 2

    ReadinessScore:
      type: object
      required: [score, track, trackLabel]
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
        track:
          type: string
          enum: [starter, emerging, established, advanced]
        trackLabel:
          type: string
        componentScores:
          type: object
          additionalProperties:
            type: number
        gaps:
          type: array
          items:
            type: string
        summary:
          type: string

    Owner:
      type: object
      required: [id, businessId, firstName, lastName, ownershipPercent]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        ownershipPercent:
          type: number
          minimum: 0
          maximum: 100
        personalCreditScore:
          type: integer
          minimum: 300
          maximum: 850
        ssn:
          type: string
          writeOnly: true

    # ── Credit ───────────────────────────────────────────────────────────────
    CreditProfile:
      type: object
      required: [id, businessId, bureau, score, pulledAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        bureau:
          type: string
          enum: [experian, equifax, transunion, dun_bradstreet, lexisnexis]
        profileType:
          type: string
          enum: [personal, business]
        score:
          type: integer
        factors:
          type: array
          items:
            type: string
        utilizationRate:
          type: number
        derogatoryMarks:
          type: integer
        pulledAt:
          type: string
          format: date-time

    CreditPullRequest:
      type: object
      required: [bureaus, profileType]
      properties:
        bureaus:
          type: array
          items:
            type: string
            enum: [experian, equifax, transunion, dun_bradstreet, lexisnexis]
          minItems: 1
        profileType:
          type: string
          enum: [personal, business]
        useCache:
          type: boolean
          default: false

    # ── Card Application ─────────────────────────────────────────────────────
    CardApplication:
      type: object
      required: [id, businessId, roundId, issuer, productName, status, appliedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        roundId:
          type: string
          format: uuid
        issuer:
          type: string
        productName:
          type: string
        creditLimitRequested:
          type: number
        creditLimitApproved:
          type: number
        annualFee:
          type: number
        aprIntroPercent:
          type: number
        aprRegularPercent:
          type: number
        signupBonusValue:
          type: number
        status:
          type: string
          enum: [pending, approved, declined, cancelled, withdrawn]
        appliedAt:
          type: string
          format: date-time
        decisionAt:
          type: string
          format: date-time

    # ── Funding Round ────────────────────────────────────────────────────────
    FundingRound:
      type: object
      required: [id, businessId, tenantId, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        targetCredit:
          type: number
        targetCardCount:
          type: integer
        issuerMixStrategy:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [planning, in_progress, completed, cancelled]
        aprExpiryDate:
          type: string
          format: date-time
        totalCreditApproved:
          type: number
        cardsApproved:
          type: integer
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRoundRequest:
      type: object
      properties:
        targetCredit:
          type: number
          minimum: 0
        targetCardCount:
          type: integer
          minimum: 1
        issuerMixStrategy:
          type: array
          items:
            type: string
        notes:
          type: string
          maxLength: 1000

    # ── Consent ──────────────────────────────────────────────────────────────
    ConsentRecord:
      type: object
      required: [id, businessId, consentType, status, capturedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        consentType:
          type: string
          enum: [credit_pull, tcpa, esign, data_sharing, marketing]
        status:
          type: string
          enum: [active, revoked, expired]
        ipAddress:
          type: string
        userAgent:
          type: string
        capturedAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time

    # ── Compliance Check ─────────────────────────────────────────────────────
    ComplianceCheck:
      type: object
      required: [id, businessId, checkType, result, performedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        checkType:
          type: string
          enum: [ofac, bsa_aml, state_license, usury_ceiling, kyb, kyc, adverse_action]
        result:
          type: string
          enum: [pass, fail, review, pending]
        riskScore:
          type: number
          minimum: 0
          maximum: 100
        flags:
          type: array
          items:
            type: string
        details:
          type: object
        performedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    # ── Document ─────────────────────────────────────────────────────────────
    Document:
      type: object
      required: [id, tenantId, businessId, category, fileName, status, uploadedAt]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        category:
          type: string
          enum: [bank_statement, adverse_action_letter, contract, kyb_document, receipt_invoice, id_document, unknown]
        fileName:
          type: string
        mimeType:
          type: string
        fileSizeBytes:
          type: integer
        status:
          type: string
          enum: [pending, processing, processed, failed, archived]
        uploadedBy:
          type: string
        vaultPath:
          type: string
        uploadedAt:
          type: string
          format: date-time

    # ── Invoice ──────────────────────────────────────────────────────────────
    Invoice:
      type: object
      required: [id, businessId, tenantId, amountCents, currency, status, issuedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        amountCents:
          type: integer
          minimum: 0
        currency:
          type: string
          default: USD
        description:
          type: string
        lineItems:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              amountCents:
                type: integer
              quantity:
                type: integer
        status:
          type: string
          enum: [draft, outstanding, paid, voided, past_due]
        dueAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
        issuedAt:
          type: string
          format: date-time

    # ── Complaint ────────────────────────────────────────────────────────────
    Complaint:
      type: object
      required: [id, businessId, tenantId, category, description, status, submittedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        category:
          type: string
          enum: [billing_dispute, compliance_violation, service_issue, fraud, other]
        description:
          type: string
        status:
          type: string
          enum: [open, under_review, resolved, escalated, closed]
        assignedTo:
          type: string
        resolutionNotes:
          type: string
        submittedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time

    # ── Partner ──────────────────────────────────────────────────────────────
    Partner:
      type: object
      required: [id, tenantId, name, partnerType, status, onboardedAt]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        partnerType:
          type: string
          enum: [referral, vendor, integration, subprocessor, white_label]
        contactEmail:
          type: string
          format: email
        contractUrl:
          type: string
        riskTier:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [active, pending_review, suspended, terminated]
        onboardedAt:
          type: string
          format: date-time
        renewalDueAt:
          type: string
          format: date-time

    # ── VoiceForge ───────────────────────────────────────────────────────────
    CallRecord:
      type: object
      required: [id, tenantId, businessId, toPhoneNumber, fromPhoneNumber, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        advisorId:
          type: string
          format: uuid
        toPhoneNumber:
          type: string
        fromPhoneNumber:
          type: string
        purpose:
          type: string
        campaignType:
          type: string
          enum: [apr_expiry, repayment_reminder, restack_consultation]
        campaignId:
          type: string
          format: uuid
        status:
          type: string
          enum: [initiated, in_progress, completed, failed, blocked_consent]
        durationSeconds:
          type: integer
        twilioCallSid:
          type: string
        createdAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time

    OutreachCampaignResult:
      type: object
      required: [campaignId, callsInitiated, consentBlocked]
      properties:
        campaignId:
          type: string
          format: uuid
        callsInitiated:
          type: integer
        consentBlocked:
          type: integer
        errors:
          type: integer

    CallComplianceScanResult:
      type: object
      required: [scanId, callId, riskScore, riskLevel, violationCount, complianceStatus]
      properties:
        scanId:
          type: string
          format: uuid
        callId:
          type: string
          format: uuid
        advisorId:
          type: string
          format: uuid
        riskScore:
          type: number
          minimum: 0
          maximum: 100
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        violationCount:
          type: integer
        violations:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              description:
                type: string
              severity:
                type: string
                enum: [info, warning, error, critical]
        complianceStatus:
          type: string
          enum: [compliant, non_compliant, needs_review]
        scannedAt:
          type: string
          format: date-time

    # ── VisionAudioForge ─────────────────────────────────────────────────────
    ProcessDocumentResult:
      type: object
      required: [processingId, category, status, processingMs]
      properties:
        processingId:
          type: string
          format: uuid
        vaultDocumentId:
          type: string
          format: uuid
        category:
          type: string
          enum: [bank_statement, adverse_action_letter, contract, kyb_document, receipt_invoice, id_document, unknown]
        status:
          type: string
          enum: [success, partial, failed]
        extractedData:
          type: object
          description: Structured fields extracted by OCR
        processingMs:
          type: integer
        confidence:
          type: number
          minimum: 0
          maximum: 1

    AgentRunResult:
      type: object
      required: [runId, agentType, approvalStatus, triggeredAt]
      properties:
        runId:
          type: string
          format: uuid
        agentType:
          type: string
          enum: [statement, kyb, contract, acknowledgment, evidence_bundle]
        approvalStatus:
          type: string
          enum: [pending_approval, approved, rejected, auto_approved]
        businessId:
          type: string
          format: uuid
        triggeredBy:
          type: string
        payload:
          type: object
        output:
          type: object
        triggeredAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    IdLivenessResult:
      type: object
      required: [processingId, livenessData]
      properties:
        processingId:
          type: string
          format: uuid
        livenessData:
          type: object
          required: [livenessVerdict, livenessScore]
          properties:
            livenessVerdict:
              type: string
              enum: [live, spoof, inconclusive]
            livenessScore:
              type: number
              minimum: 0
              maximum: 1
            documentAuthenticity:
              type: string
              enum: [authentic, tampered, inconclusive]
            faceMatchScore:
              type: number

    # ── Repayment / ACH ──────────────────────────────────────────────────────
    RepaymentSchedule:
      type: object
      required: [id, businessId, totalAmountCents, installments]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        totalAmountCents:
          type: integer
        currency:
          type: string
          default: USD
        installments:
          type: array
          items:
            type: object
            properties:
              dueDate:
                type: string
                format: date
              amountCents:
                type: integer
              status:
                type: string
                enum: [scheduled, processing, paid, failed, waived]

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    Forbidden:
      description: Authenticated but insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    ValidationError:
      description: Request body or query parameters failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ══════════════════════════════════════════════════════════════════════════
  # AUTH
  # ══════════════════════════════════════════════════════════════════════════

  /auth/login:
    post:
      tags: [Auth]
      operationId: authLogin
      summary: Authenticate and obtain JWT pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/AuthUser'
                          accessToken:
                            type: string
                          refreshToken:
                            type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/register:
    post:
      tags: [Auth]
      operationId: authRegister
      summary: Register a new user under an existing tenant
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/AuthUser'
                          accessToken:
                            type: string
                          refreshToken:
                            type: string
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: authRefresh
      summary: Rotate refresh token and issue new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: authLogout
      summary: Invalidate the current refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          loggedOut:
                            type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ══════════════════════════════════════════════════════════════════════════
  # CORE OPERATIONS — Businesses / Onboarding
  # ══════════════════════════════════════════════════════════════════════════

  /businesses:
    post:
      tags: [Core Operations]
      operationId: createBusiness
      summary: Onboard a new business
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBusinessRequest'
      responses:
        '201':
          description: Business created with initial readiness score
          content:
            application/json:
              schema:
                allOf:

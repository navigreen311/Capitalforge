name: Deploy

# ─────────────────────────────────────────────────────────────
# Triggers
#   • push to main   → build + push images → deploy to staging
#   • release tag    → build + push images → deploy to production
#   • manual         → choose environment explicitly
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight deployment

# ─────────────────────────────────────────────────────────────
# Global env — secrets resolved at job level
# ─────────────────────────────────────────────────────────────
env:
  NODE_VERSION:     "20"
  REGISTRY:         ghcr.io
  IMAGE_NAMESPACE:  ${{ github.repository_owner }}/capitalforge
  # Resolved at job runtime via github.ref_name or PR merge SHA
  IMAGE_TAG:        ${{ github.sha }}

# ═════════════════════════════════════════════════════════════
# Job 1 — Build & Push Docker Images
# ═════════════════════════════════════════════════════════════
jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required for ghcr.io push

    outputs:
      image_tag: ${{ steps.meta-backend.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend image metadata ────────────────────────────────
      - name: Generate backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      # ── Frontend image metadata ───────────────────────────────
      - name: Generate frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      # ── Build & push backend ──────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context:     .
          file:        Dockerfile
          push:        true
          tags:        ${{ steps.meta-backend.outputs.tags }}
          labels:      ${{ steps.meta-backend.outputs.labels }}
          cache-from:  type=gha,scope=backend
          cache-to:    type=gha,mode=max,scope=backend
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}

      # ── Build & push frontend ─────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       Dockerfile.frontend
          push:       true
          tags:       ${{ steps.meta-frontend.outputs.tags }}
          labels:     ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            NEXT_PUBLIC_API_URL=/api

  # ═════════════════════════════════════════════════════════════
  # Job 2 — Deploy to Staging
  # Runs on: push to main OR manual dispatch with environment=staging
  # ═════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: build-and-push

    # Only run on push to main or manual staging dispatch
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    environment:
      name: staging
      url:  ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add staging host to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts

      - name: Run database migrations on staging
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
            "cd /opt/capitalforge && \
             IMAGE_TAG=${IMAGE_TAG} \
             REGISTRY=${{ env.REGISTRY }} \
             IMAGE_NAMESPACE=${{ env.IMAGE_NAMESPACE }} \
             docker compose -f docker-compose.prod.yml run --rm backend \
               npx prisma migrate deploy"

      - name: Pull new images on staging
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
            "cd /opt/capitalforge && \
             IMAGE_TAG=${IMAGE_TAG} \
             REGISTRY=${{ env.REGISTRY }} \
             IMAGE_NAMESPACE=${{ env.IMAGE_NAMESPACE }} \
             docker compose -f docker-compose.prod.yml pull backend frontend"

      - name: Zero-downtime rolling restart on staging
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
            "cd /opt/capitalforge && \
             IMAGE_TAG=${IMAGE_TAG} \
             REGISTRY=${{ env.REGISTRY }} \
             IMAGE_NAMESPACE=${{ env.IMAGE_NAMESPACE }} \
             docker compose -f docker-compose.prod.yml up -d \
               --no-deps --remove-orphans backend frontend"

      - name: Verify staging health check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ vars.STAGING_DOMAIN }}/api/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Staging health check failed after 2 minutes." >&2
          exit 1

  # ═════════════════════════════════════════════════════════════
  # Job 3 — Deploy to Production
  # Runs on: published release tag OR manual dispatch with environment=production
  # ═════════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest
    needs: build-and-push

    # Only run on release publish or manual production dispatch
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    environment:
      name: production
      url:  ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Add production host to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts

      - name: Create pre-deployment database backup
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" \
            "cd /opt/capitalforge && bash scripts/backup.sh pre-deploy-${GITHUB_SHA:0:7}"

      - name: Run database migrations on production
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" \
            "cd /opt/capitalforge && \
             IMAGE_TAG=${IMAGE_TAG} \
             REGISTRY=${{ env.REGISTRY }} \
             IMAGE_NAMESPACE=${{ env.IMAGE_NAMESPACE }} \
             docker compose -f docker-compose.prod.yml run --rm backend \
               npx prisma migrate deploy"

      - name: Pull new images on production
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" \
            "cd /opt/capitalforge && \
             IMAGE_TAG=${IMAGE_TAG} \
             REGISTRY=${{ env.REGISTRY }} \
             IMAGE_NAMESPACE=${{ env.IMAGE_NAMESPACE }} \
             docker compose -f docker-compose.prod.yml pull backend frontend"

      - name: Zero-downtime rolling restart on production
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" \
            "cd /opt/capitalforge && \
             IMAGE_TAG=${IMAGE_TAG} \
             REGISTRY=${{ env.REGISTRY }} \
             IMAGE_NAMESPACE=${{ env.IMAGE_NAMESPACE }} \
             docker compose -f docker-compose.prod.yml up -d \
               --no-deps --remove-orphans backend frontend"

      - name: Verify production health check
        run: |
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ vars.PRODUCTION_DOMAIN }}/api/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Production health check failed after 3 minutes." >&2
          exit 1

      - name: Tag deployment in GitHub
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            "/repos/${{ github.repository }}/deployments" \
            --field ref="${{ github.sha }}" \
            --field environment="production" \
            --field description="Deployed ${{ github.ref_name }} to production" \
            --field auto_merge=false \
            --field required_contexts="[]" || true

      # ── Rollback step — only runs on failure ──────────────────
      - name: Rollback production on failure
        if: failure()
        run: |
          echo "Deployment failed — initiating rollback to previous image." >&2
          ssh "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" \
            "cd /opt/capitalforge && \
             REGISTRY=${{ env.REGISTRY }} \
             IMAGE_NAMESPACE=${{ env.IMAGE_NAMESPACE }} \
             IMAGE_TAG=latest \
             docker compose -f docker-compose.prod.yml up -d \
               --no-deps backend frontend" || true
          echo "Rollback attempted. Review logs on the production host." >&2
          exit 1

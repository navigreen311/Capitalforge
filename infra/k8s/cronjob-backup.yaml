# =============================================================================
# CapitalForge — CronJob: Daily Database Backup
#
# Runs scripts/backup.sh daily at 02:00 UTC inside a postgres:16-alpine
# container that has pg_dump, gzip, and the AWS CLI available.
#
# The backup script requires:
#   DATABASE_URL  — sourced from capitalforge-secrets
#   S3_BUCKET     — sourced from capitalforge-secrets
#   BACKUP_DIR    — sourced from capitalforge-config (default /var/backups/capitalforge)
#   S3_REGION     — sourced from capitalforge-config
#   RETENTION_DAYS — sourced from capitalforge-config (default 90)
#
# The backup.sh script is mounted from a ConfigMap so it can be updated
# without rebuilding the image. See the ConfigMap `capitalforge-backup-scripts`
# defined below.
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: capitalforge
  labels:
    app.kubernetes.io/name: capitalforge
    app.kubernetes.io/component: db-backup
    app.kubernetes.io/managed-by: kustomize
spec:
  # Daily at 02:00 UTC
  schedule: "0 2 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300

  jobTemplate:
    spec:
      # Retry once on failure
      backoffLimit: 1
      activeDeadlineSeconds: 3600   # 1-hour hard timeout

      template:
        metadata:
          labels:
            app.kubernetes.io/name: capitalforge
            app.kubernetes.io/component: db-backup
        spec:
          restartPolicy: OnFailure

          securityContext:
            runAsNonRoot: true
            runAsUser: 999    # postgres image default non-root uid
            runAsGroup: 999
            fsGroup: 999
            seccompProfile:
              type: RuntimeDefault

          containers:
            - name: backup
              # postgres:16-alpine provides pg_dump and gzip.
              # aws-cli must be separately available or install inline.
              # For production, use a custom image that pre-installs awscli:
              #   FROM postgres:16-alpine
              #   RUN apk add --no-cache aws-cli bash
              image: postgres:16-alpine
              imagePullPolicy: IfNotPresent

              command:
                - /bin/bash
                - /scripts/backup.sh
                - "scheduled"

              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"

              envFrom:
                - configMapRef:
                    name: capitalforge-config
                - secretRef:
                    name: capitalforge-secrets

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false   # backup.sh writes to BACKUP_DIR
                capabilities:
                  drop:
                    - ALL

              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                  readOnly: true
                - name: backup-storage
                  mountPath: /var/backups/capitalforge

          volumes:
            - name: backup-scripts
              configMap:
                name: capitalforge-backup-scripts
                defaultMode: 0755
            # Ephemeral storage for the compressed dump before S3 upload.
            # For large databases, switch to a PVC backed by EBS/EFS.
            - name: backup-storage
              emptyDir:
                sizeLimit: 5Gi

---
# ── backup.sh ConfigMap ───────────────────────────────────────────────────────
# Embeds the backup script so it can be updated independently of the image.
# The actual script content is read from scripts/backup.sh at kustomize build
# time using the files generator. This stub references the external file.
apiVersion: v1
kind: ConfigMap
metadata:
  name: capitalforge-backup-scripts
  namespace: capitalforge
  labels:
    app.kubernetes.io/name: capitalforge
    app.kubernetes.io/component: db-backup
    app.kubernetes.io/managed-by: kustomize
data:
  # Kustomize's configMapGenerator (in kustomization.yaml) will replace this
  # placeholder with the real content of scripts/backup.sh at build time.
  # If applying this file directly, paste the backup.sh content here.
  backup.sh: |
    #!/usr/bin/env bash
    # Content is injected by kustomize configMapGenerator from ../../scripts/backup.sh
    # See kustomization.yaml: configMapGenerator[name=capitalforge-backup-scripts]
    echo "ERROR: backup.sh was not injected by kustomize. Exiting." >&2
    exit 1

# =============================================================================
# CapitalForge — Frontend Deployment
# Next.js standalone server on port 3000.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: capitalforge
  labels:
    app.kubernetes.io/name: capitalforge
    app.kubernetes.io/component: frontend
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: capitalforge
      app.kubernetes.io/component: frontend

  # ── Rolling update — zero-downtime deploys ────────────────────────────────
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app.kubernetes.io/name: capitalforge
        app.kubernetes.io/component: frontend
      annotations:
        checksum/config: "placeholder-updated-by-kustomize"
    spec:
      # ── Security context (pod-level) ──────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      terminationGracePeriodSeconds: 30

      # ── Spread across AZs ─────────────────────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: frontend

      containers:
        - name: frontend
          # Replace with your ECR image URI:
          # <account-id>.dkr.ecr.us-east-1.amazonaws.com/capitalforge/frontend:latest
          image: capitalforge/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # ── Resource limits ───────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ── Liveness probe ────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # ── Readiness probe ───────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── Startup probe ─────────────────────────────────────────────────
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 5

          # ── Environment ───────────────────────────────────────────────────
          envFrom:
            - configMapRef:
                name: capitalforge-config

          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"

          # ── Container security context ────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # Next.js standalone writes cache to .next/cache
            - name: next-cache
              mountPath: /app/src/frontend/.next/cache

      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}

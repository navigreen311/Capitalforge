# =============================================================================
# CapitalForge — Backend Deployment
# Express API server on port 4000.
# Image tag is overridden at deploy time via Kustomize image transformer or
# the IMAGE_TAG build arg injected by the CI/CD pipeline.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: capitalforge
  labels:
    app.kubernetes.io/name: capitalforge
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: capitalforge
      app.kubernetes.io/component: backend

  # ── Rolling update — zero-downtime deploys ────────────────────────────────
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app.kubernetes.io/name: capitalforge
        app.kubernetes.io/component: backend
      annotations:
        # Force pod restart when the ConfigMap or Secret changes
        checksum/config: "placeholder-updated-by-kustomize"
    spec:
      # ── Security context (pod-level) ──────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # ── Graceful termination ──────────────────────────────────────────────
      terminationGracePeriodSeconds: 60

      # ── Spread across AZs ────────────────────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: backend

      containers:
        - name: backend
          # Replace with your ECR image URI, e.g.:
          # <account-id>.dkr.ecr.us-east-1.amazonaws.com/capitalforge/backend:latest
          image: capitalforge/backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP

          # ── Resource limits ───────────────────────────────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

          # ── Liveness probe — restart pod if server is stuck ───────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # ── Readiness probe — remove from LB until fully ready ───────────
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── Startup probe — give extra time on cold start ────────────────
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12   # 10s + 12*5s = 70s max before liveness kicks in
            timeoutSeconds: 5

          # ── Environment: non-secret config ───────────────────────────────
          envFrom:
            - configMapRef:
                name: capitalforge-config
            - secretRef:
                name: capitalforge-secrets

          # ── Explicit env overrides ────────────────────────────────────────
          env:
            - name: PORT
              value: "4000"

          # ── Container security context ───────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # ── Writable tmp for any ephemeral writes ─────────────────────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      # ── EKS node group affinity (optional — pin to application nodes) ─────
      # Uncomment if you have a dedicated node group labelled `role=app`:
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #             - key: role
      #               operator: In
      #               values: [app]

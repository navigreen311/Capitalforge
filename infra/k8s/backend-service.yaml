# =============================================================================
# CapitalForge — Backend Service (ClusterIP)
# Exposes the backend Deployment internally on port 4000.
# The ingress and frontend pods reach the API via this Service DNS name:
#   http://backend.capitalforge.svc.cluster.local:4000
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: capitalforge
  labels:
    app.kubernetes.io/name: capitalforge
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: capitalforge
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 4000
      targetPort: http
      protocol: TCP

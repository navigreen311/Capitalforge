# =============================================================================
# CapitalForge — Secret Template
#
# IMPORTANT: This file contains base64-encoded PLACEHOLDER values only.
# DO NOT commit real credentials into source control.
#
# Before applying:
#   1. Replace every <base64-encoded-...> placeholder with the real value:
#        echo -n "my-secret-value" | base64
#   2. Or use a secrets manager integration (AWS Secrets Manager + External
#      Secrets Operator, Sealed Secrets, or Vault Agent Injector) to populate
#      secrets automatically — recommended for production EKS clusters.
#
# Applying this template as-is will cause pods to fail at startup because the
# backend config requires JWT_SECRET, DATABASE_URL, and REDIS_URL at minimum.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: capitalforge-secrets
  namespace: capitalforge
  labels:
    app.kubernetes.io/name: capitalforge
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # Remind operators this file must be rotated externally
    secret-rotation: "manual — integrate with AWS Secrets Manager for automation"
type: Opaque
data:
  # ── Database ────────────────────────────────────────────────────────────────
  # Full PostgreSQL connection string:
  # postgresql://capitalforge:<password>@<rds-endpoint>:5432/capitalforge
  DATABASE_URL: <base64-encoded-postgresql-connection-string>

  # ── Redis ───────────────────────────────────────────────────────────────────
  # Full Redis URL: redis://:<password>@<elasticache-endpoint>:6379
  REDIS_URL: <base64-encoded-redis-url>

  # ── JWT ─────────────────────────────────────────────────────────────────────
  # Minimum 32 random bytes: openssl rand -base64 32
  JWT_SECRET: <base64-encoded-jwt-secret>

  # ── Auth0 (optional — omit keys if not using Auth0) ─────────────────────────
  AUTH0_DOMAIN: <base64-encoded-auth0-domain>
  AUTH0_CLIENT_ID: <base64-encoded-auth0-client-id>
  AUTH0_CLIENT_SECRET: <base64-encoded-auth0-client-secret>

  # ── Anthropic ───────────────────────────────────────────────────────────────
  ANTHROPIC_API_KEY: <base64-encoded-anthropic-api-key>

  # ── Plaid ───────────────────────────────────────────────────────────────────
  PLAID_CLIENT_ID: <base64-encoded-plaid-client-id>
  PLAID_SECRET: <base64-encoded-plaid-secret>

  # ── Stripe ──────────────────────────────────────────────────────────────────
  STRIPE_SECRET_KEY: <base64-encoded-stripe-secret-key>

  # ── DocuSign ────────────────────────────────────────────────────────────────
  DOCUSIGN_INTEGRATION_KEY: <base64-encoded-docusign-integration-key>

  # ── Twilio ──────────────────────────────────────────────────────────────────
  TWILIO_ACCOUNT_SID: <base64-encoded-twilio-account-sid>
  TWILIO_AUTH_TOKEN: <base64-encoded-twilio-auth-token>

  # ── AWS credentials (use IRSA / pod identity on EKS instead when possible) ──
  AWS_ACCESS_KEY_ID: <base64-encoded-aws-access-key-id>
  AWS_SECRET_ACCESS_KEY: <base64-encoded-aws-secret-access-key>

  # ── Backup S3 bucket name ────────────────────────────────────────────────────
  S3_BUCKET: <base64-encoded-s3-bucket-name>
